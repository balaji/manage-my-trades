services:
  database:
    image: timescale/timescaledb:latest-pg18
    container_name: trading_db
    environment:
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_password
      POSTGRES_DB: trading_db
    ports:
      - "5432:5432"
    networks:
      - trading_network
    volumes:
      - trades_data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_backend
    ports:
      - "8000:8000"
    environment:
      - TRADE_DATA_DATABASE_URL=postgresql+psycopg://trading_user:trading_password@database:5432/trading_db
      - MARKET_DATA_DATABASE_URL=postgresql+psycopg://trading_user:trading_password@database:5432/market_data_db
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_BASE_URL=https://paper-api.alpaca.markets
      - MODEL_STORAGE_PATH=/app/storage/models
      - DATA_CACHE_PATH=/app/storage/data
      - DEBUG=True
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=["http://bigmac.local:3000"]
    networks:
      - trading_network
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: sync
          path: ./backend/tests
          target: /app/tests
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://bigmac.local:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://bigmac.local:8000/ws
    networks:
      - trading_network
    depends_on:
      - backend
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json

volumes:
  trades_data:
    external: true

networks:
  trading_network:
    driver: bridge
