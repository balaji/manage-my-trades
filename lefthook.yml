pre-commit:
  commands:
    ruff-format:
      glob: "backend/**/*.py"
      root: "backend"
      run: uv run ruff format {staged_files}
    ruff-check:
      glob: "backend/**/*.py"
      root: "backend"
      run: uv run ruff check --fix {staged_files}
    prettier:
      glob: "frontend/**/*.{ts,tsx,js,jsx,json,css}"
      root: "frontend"
      run: npm run format {staged_files}
    eslint:
      glob: "frontend/**/*.{ts,tsx,js,jsx}"
      root: "frontend"
      run: npm run lint {staged_files}
